<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Pet Shop - Member Card</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dps-main: #c54327;      /* สีหลักจาก CI */
      --dps-secondary: #f2e2c0; /* สีรองจาก CI */
      --dps-accent: #faaf73;    /* สีส้มอ่อนจาก Palette */
      --dps-green: #305640;     /* สีเขียวเข้มจาก Palette */
      --white: #ffffff;
      --text-dark: #4A3F35;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--dps-secondary);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* 🏷️ Header Card Section */
    .header-card {
      background: var(--dps-main);
      width: 90%;
      max-width: 400px;
      border-radius: 20px 20px 0 0;
      padding: 25px 20px;
      margin-top: 20px;
      color: white;
      box-shadow: 0 4px 15px rgba(197, 67, 39, 0.2);
      position: relative;
    }

    .level-info { display: flex; justify-content: space-between; align-items: center; }
    .level-name { font-size: 1.5rem; font-weight: 600; letter-spacing: 1px; }
    .benefit-link { font-size: 0.8rem; text-decoration: none; color: white; opacity: 0.9; }

    .progress-container { background: rgba(255,255,255,0.2); height: 10px; border-radius: 5px; margin: 15px 0 10px 0; }
    .progress-bar { background: var(--dps-accent); height: 100%; border-radius: 5px; transition: width 1s ease-in-out; }

    /* 🪪 Main Body Container */
    .main-container {
      background: var(--white);
      width: 90%;
      max-width: 400px;
      border-radius: 0 0 20px 20px;
      padding: 30px 20px;
      box-sizing: border-box;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
    }

    .qr-box img { 
      width: 160px; 
      padding: 10px; 
      border: 1px solid #eee; 
      border-radius: 15px; 
      margin-bottom: 15px; 
    }
    
    .user-name { font-size: 1.3rem; font-weight: 600; color: var(--dps-main); margin: 5px 0; }
    .member-id { font-size: 0.9rem; color: #888; margin-bottom: 25px; }

    .points-section { 
      background-color: #fff9f5; 
      border-radius: 15px; 
      padding: 20px; 
      border: 1px dashed var(--dps-accent); 
    }
    .points-value { font-size: 2.5rem; font-weight: 700; color: var(--dps-main); line-height: 1; }
    .points-label { font-size: 1rem; color: var(--text-dark); }
    .points-expiring { font-size: 0.85rem; color: #888; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }

    /* 🎫 Tab & Coupon */
    .tab-menu { display: flex; width: 90%; max-width: 400px; margin-top: 25px; gap: 10px; }
    .tab-item { 
      flex: 1; text-align: center; padding: 12px; font-weight: 500; 
      border-radius: 10px 10px 0 0; background: rgba(255,255,255,0.5); color: #888; 
    }
    .tab-item.active { background: var(--white); color: var(--dps-main); border-bottom: 3px solid var(--dps-main); }

    /* ⏳ Loading */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--dps-secondary); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" width="80" style="filter: hue-rotate(330deg);">
    <p style="color: var(--dps-main); font-weight: 500;">🐾 กำลังดึงข้อมูลสมาชิก...</p>
  </div>

  <div class="header-card">
    <div class="level-info">
      <span class="level-name" id="display-level">Loading...</span>
      <span class="benefit-link">สิทธิประโยชน์ ></span>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="level-progress" style="width: 0%"></div>
    </div>
    <div id="next-level-text" style="font-size: 0.75rem; opacity: 0.9;">สะสมยอดซื้อเพื่อปรับระดับ</div>
  </div>

  <div class="main-container">
    <div class="qr-box">
      <img id="member-qr" src="" alt="Member QR">
    </div>
    <div class="user-name" id="display-name">...</div>
    <div class="member-id">ID: <span id="display-id">...</span></div>

    <div class="points-section">
      <div class="points-value" id="display-points">0</div>
      <div class="points-label">คะแนนสะสม</div>
      <div class="points-expiring" id="display-expiring">ไม่มีคะแนนหมดอายุ</div>
    </div>
  </div>

  <div class="tab-menu">
    <div class="tab-item active">คูปองของฉัน</div>
    <div class="tab-item">แลกแต้ม</div>
  </div>

  <script>
    // 2. ฟังก์ชันหลักสำหรับ LIFF
    async function main() {
      try {
        // เปลี่ยน LIFF ID ให้ตรงกับหน้า Console ของคุณ
        await liff.init({ liffId: "2009630242-iPO8WjV7" });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        loadData(profile.userId);
      } catch (err) {
        console.error("LIFF Init Error", err);
        document.getElementById('loading-screen').innerHTML = "<p>❌ ไม่สามารถเชื่อมต่อ LINE ได้</p>";
      }
    }

    function loadData(userId) {
      google.script.run
        .withSuccessHandler(function(data) {
          if (!data) {
            // 3. ถ้าไม่พบข้อมูลสมาชิก ให้ Redirect ไปหน้าสมัคร
            window.location.href = "<?= ScriptApp.getService().getUrl() ?>?userId=" + userId;
            return;
          }
          renderUI(data);
        })
        .withFailureHandler(err => {
          document.getElementById('loading-screen').innerHTML = "<p>❌ เกิดข้อผิดพลาด กรุณาลองใหม่</p>";
        })
        .getCustomerProfile(userId);
    }

    function renderUI(data) {
      document.getElementById('loading-screen').style.display = 'none';
      
      document.getElementById('display-name').innerText = data.name;
      document.getElementById('display-id').innerText = data.memberId;
      document.getElementById('display-level').innerText = data.level;
      document.getElementById('display-points').innerText = data.points.toLocaleString();
      
      document.getElementById('member-qr').src = `https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${data.memberId}&choe=UTF-8`;

      if(data.pointsExpiring > 0) {
        document.getElementById('display-expiring').innerText = 
          `${data.pointsExpiring} คะแนนจะหมดอายุในวันที่ ${data.expiringDate}`;
      }

      const spending = data.totalSpending || 0;
      const target = 5000;
      const progress = Math.min((spending / target) * 100, 100);
      document.getElementById('level-progress').style.width = progress + "%";
      
      if (spending < target) {
        document.getElementById('next-level-text').innerText = 
          `สะสมอีก ${(target - spending).toLocaleString()} บาท เพื่อระดับถัดไป`;
      } else {
        document.getElementById('next-level-text').innerText = `คุณคือสมาชิกระดับสูงสุด 🎉`;
      }
    }

    // รันฟังก์ชัน main เมื่อโหลดหน้าเสร็จ
    window.onload = main;
  </script>
</body>
</html>
