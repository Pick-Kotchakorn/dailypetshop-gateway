<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Pet Shop - Member Card</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dps-main: #c54327;
      --dps-secondary: #f2e2c0;
      --dps-accent: #faaf73;
      --white: #ffffff;
      --text-dark: #4A3F35;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--dps-secondary);
      color: var(--text-dark);
      margin: 0; padding: 0;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }

    /* ส่วนหัวของบัตร */
    .header-card {
      background: var(--dps-main);
      width: 90%; max-width: 400px;
      border-radius: 20px 20px 0 0;
      padding: 25px 20px; margin-top: 20px;
      color: white; box-shadow: 0 4px 15px rgba(197, 67, 39, 0.2);
    }

    .level-info { display: flex; justify-content: space-between; align-items: center; }
    .level-name { font-size: 1.5rem; font-weight: 600; }

    .progress-container { background: rgba(255,255,255,0.2); height: 10px; border-radius: 5px; margin: 15px 0 10px 0; }
    .progress-bar { background: var(--dps-accent); height: 100%; border-radius: 5px; width: 0%; transition: width 1s; }

    /* ส่วนเนื้อหาหลัก */
    .main-container {
      background: var(--white);
      width: 90%; max-width: 400px;
      border-radius: 0 0 20px 20px;
      padding: 30px 20px; box-sizing: border-box;
      text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .user-name { font-size: 1.3rem; font-weight: 600; color: var(--dps-main); }
    .points-section { 
      background-color: #fff9f5; border-radius: 15px; 
      padding: 20px; border: 1px dashed var(--dps-accent); margin-top: 20px;
    }
    .points-value { font-size: 2.5rem; font-weight: 700; color: var(--dps-main); }

    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--dps-secondary); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <p>🐾 กำลังดึงข้อมูลสมาชิก...</p>
  </div>

  <div class="header-card">
    <div class="level-info">
      <span class="level-name" id="display-level">Loading...</span>
    </div>
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <div class="main-container">
    <div class="user-name" id="display-name">...</div>
    <div class="points-section">
      <div class="points-value" id="display-points">0</div>
      <div>คะแนนสะสม</div>
    </div>
  </div>

  <script>
    async function main() {
      try {
        await liff.init({ liffId: "2009630242-iPO8WjV7" });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        loadMemberData(profile.userId);
      } catch (err) {
        console.error(err);
      }
    }

    function loadMemberData(userId) {
      google.script.run
        .withSuccessHandler(function(data) {
          if (!data) {
            // ถ้าไม่พบข้อมูลสมาชิก ให้ส่งไปหน้าลงทะเบียน
            window.location.href = "https://script.google.com/macros/s/AKfycbz_kElS6ZfO9CazuBHPL5jz6F_TZMHagzFVoRybcgfh-qgqkdDaIDs-9alUE0-oUKNm/exec?page=registration";
            return;
          }
          renderUI(data);
        })
        .getCustomerProfile(userId);
    }

    function renderUI(data) {
      document.getElementById('display-name').innerText = data.name;
      document.getElementById('display-level').innerText = data.level;
      document.getElementById('display-points').innerText = data.points.toLocaleString();
      
      // คำนวณ Progress Bar (ตัวอย่าง: เต็มที่ 5,000 แต้ม)
      const percent = Math.min((data.points / 5000) * 100, 100);
      document.getElementById('progress-bar').style.width = percent + "%";
      
      document.getElementById('loading-screen').style.display = 'none';
    }

    main();
  </script>
</body>
</html>
