<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Pet Shop - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://earthchie.github.io/jquery.Thailand.js/jquery.Thailand.js/dist/jquery.Thailand.min.css">
  <style>
    :root {
      --primary-color: #c54327; 
      --secondary-color: #f3e3c0; 
      --text-dark: #4A3F35;
    }

    body { 
      font-family: 'Prompt', sans-serif; 
      background-color: var(--secondary-color); 
      color: var(--text-dark);
      padding: 15px; margin: 0;
    }

    .form-container { 
      background: white; padding: 25px; border-radius: 20px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto;
    }

    h2 { color: var(--primary-color); text-align: center; margin-bottom: 20px; }
    .input-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-size: 0.9em; font-weight: 500; }
    
    input, select, textarea { 
      width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
      box-sizing: border-box; font-family: 'Prompt', sans-serif; font-size: 16px;
    }

    .readonly-input { background-color: #f5f5f5; color: #777; cursor: not-allowed; }

    .btn-submit { 
      width: 100%; background: var(--primary-color); color: white; border: none; 
      padding: 15px; border-radius: 30px; font-size: 1.1em; font-weight: 500;
      cursor: pointer; margin-top: 15px;
    }

    .address-hint { font-size: 0.8em; color: #c54327; margin-bottom: 10px; }
    
    #loading-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(255,255,255,0.9); display: flex; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 1000;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <p>กำลังเตรียมข้อมูล...</p>
  </div>

  <div class="form-container">
    <h2>ลงทะเบียนสมาชิก 🐾</h2>
    <form id="regForm">
      <input type="hidden" id="userId" name="userId" value="<?= userId ?>">
      
      <div class="input-group">
        <label>ชื่อ LINE</label>
        <input type="text" id="lineName" name="lineName" class="readonly-input" readonly required>
      </div>

      <div class="input-group">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" name="fullName" placeholder="กรอกชื่อจริง-นามสกุล" required>
      </div>

      <div class="input-group">
        <label>อีเมล (Email)</label>
        <input type="email" name="email" placeholder="example@email.com" required>
      </div>

      <div class="input-group">
        <label>เพศ</label>
        <select name="gender" required>
          <option value="">เลือกเพศ</option>
          <option value="ชาย">ชาย</option>
          <option value="หญิง">หญิง</option>
        </select>
      </div>

      <div class="input-group">
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" name="tel" pattern="[0-9]{9,10}" placeholder="08XXXXXXXX" required>
      </div>

      <div class="input-group">
        <label>วันเกิด</label>
        <input type="date" name="birthday" required>
      </div>

      <hr style="border: 0.5px solid #eee; margin: 20px 0;">
      
      <label>ข้อมูลที่อยู่</label>
      <div class="address-hint">* พิมพ์ชื่อตำบล หรือ อำเภอ เพื่อเลือกจากรายการ</div>
      
      <div class="input-group">
        <input type="text" id="district" name="district" placeholder="ตำบล / แขวง" required>
      </div>
      <div class="input-group">
        <input type="text" id="amphoe" name="amphoe" placeholder="อำเภอ / เขต" required>
      </div>
      <div class="input-group">
        <input type="text" id="province" name="province" placeholder="จังหวัด" required>
      </div>
      <div class="input-group">
        <input type="text" id="zipcode" name="zipcode" placeholder="รหัสไปรษณีย์" required>
      </div>
      <div class="input-group">
        <textarea name="addr_detail" rows="2" placeholder="รายละเอียดที่อยู่ (บ้านเลขที่, หมู่บ้าน, ซอย, ถนน)" required></textarea>
      </div>

      <button type="submit" class="btn-submit">ยืนยันการสมัคร</button>
    </form>
  </div>

  <script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script type="text/javascript" src="https://earthchie.github.io/jquery.Thailand.js/jquery.Thailand.js/dist/dependencies/JQL.min.js"></script>
  <script type="text/javascript" src="https://earthchie.github.io/jquery.Thailand.js/jquery.Thailand.js/dist/dependencies/typeahead.bundle.js"></script>
  <script type="text/javascript" src="https://earthchie.github.io/jquery.Thailand.js/jquery.Thailand.js/dist/jquery.Thailand.min.js"></script>

  <script>
    $(function () {
      // ✅ ข้อ 1: เรียกใช้ระบบ Dropdown อัจฉริยะ (แนะนำให้พิมพ์ที่ช่อง ตำบล ก่อน)
      $.Thailand({
        $district: $('#district'),
        $amphoe: $('#amphoe'),
        $province: $('#province'),
        $zipcode: $('#zipcode'),
      });

      // ดึงโปรไฟล์ LINE เมื่อเปิดหน้า
      google.script.run
        .withSuccessHandler(function(profile) {
          if(profile) {
            document.getElementById('lineName').value = profile.displayName || "Customer";
          }
          document.getElementById('loading-overlay').style.display = 'none';
        })
        .getUserProfile("<?= userId ?>");
    });

    document.getElementById('regForm').onsubmit = function(e) {
      e.preventDefault();
      const btn = document.querySelector('.btn-submit');
      btn.innerText = "กำลังบันทึก...";
      btn.disabled = true;

      const f = this;
      const fullAddress = `${f.addr_detail.value} ต.${f.district.value} อ.${f.amphoe.value} จ.${f.province.value} ${f.zipcode.value}`;

      const formData = {
        userId: f.userId.value,
        lineName: f.lineName.value,
        fullName: f.fullName.value,
        email: f.email.value, // ✅ ข้อ 3: เพิ่ม Email ในชุดข้อมูล
        gender: f.gender.value,
        tel: f.tel.value,
        birthday: f.birthday.value,
        address: fullAddress
      };

      // ส่งข้อมูลไปยัง Google Apps Script
      google.script.run
        .withSuccessHandler(function(res) {
          alert("สมัครสมาชิกเรียบร้อยแล้ว!");
          // ✅ ข้อ 2: แก้ไขปัญหาหน้าขาวโดยใช้ตัวแปร URL จากฝั่ง Server หรือ Redirect ตรงๆ
          // แนะนำให้ Redirect ไปยังหน้าที่มีการเช็คสถานะสมัครแล้ว
          const webAppUrl = "https://script.google.com/macros/s/AKfycbwbrYbJe03nd58Bm-4Y2ixWNpIWeQ4Dxsh52W19QOYJgi1BXOyC-xsx_uMuKdbfUe0XeQ/exec";
          window.top.location.href = webAppUrl + "?userId=" + encodeURIComponent(formData.userId);
        })
        .registerNewMember(formData);
    };
  </script>
</body>
</html>
