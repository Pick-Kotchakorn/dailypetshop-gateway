<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Pet Shop - Register</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://earthchie.github.io/jquery.Thailand.js/jquery.Thailand.js/dist/jquery.Thailand.min.css">
  <style>
    :root {
      --primary-color: #c54327;
      --secondary-color: #f3e3c0;
      --text-dark: #4A3F35;
      --white: #ffffff;
    }

    body { 
      font-family: 'Kanit', sans-serif; 
      background-color: var(--secondary-color); 
      color: var(--text-dark);
      padding: 15px; margin: 0;
      display: flex; justify-content: center;
    }

    .form-container { 
      background: var(--white); padding: 30px; border-radius: 25px; 
      box-shadow: 0 8px 20px rgba(197, 67, 39, 0.15); 
      width: 100%; max-width: 450px; margin: auto;
    }

    h2 { color: var(--primary-color); text-align: center; margin-bottom: 25px; font-weight: 600; }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-size: 0.9em; font-weight: 500; color: #666; }
    
    input, select, textarea { 
      width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; 
      box-sizing: border-box; font-family: 'Kanit', sans-serif; font-size: 16px;
    }

    .readonly-input { background-color: #f9f9f9; color: #888; cursor: not-allowed; border-style: dashed; }

    .btn-submit { 
      width: 100%; background: var(--primary-color); color: white; border: none; 
      padding: 16px; border-radius: 30px; font-size: 1.1em; font-weight: 500;
      cursor: pointer; margin-top: 20px;
    }

    .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }

    #loading-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 1000;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" width="60" style="filter: hue-rotate(330deg); margin-bottom: 15px;">
    <p id="loading-text" style="color: var(--primary-color); font-weight: 500;">กำลังดึงข้อมูลโปรไฟล์...</p>
  </div>

  <div class="form-container">
    <h2>ลงทะเบียนสมาชิก 🐾</h2>
    <form id="regForm">
      <input type="hidden" id="userId" name="userId">
      
      <div class="input-group">
        <label>ชื่อ LINE</label>
        <input type="text" id="lineName" name="lineName" class="readonly-input" readonly required>
      </div>

      <div class="input-group">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="fullName" name="fullName" placeholder="กรอกชื่อจริง-นามสกุล" required>
      </div>

      <div class="input-group">
        <label>อีเมล (Email)</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>

      <div class="row" style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;">
          <label>เพศ</label>
          <select id="gender" name="gender" required>
            <option value="">เลือก</option>
            <option value="ชาย">ชาย</option>
            <option value="หญิง">หญิง</option>
          </select>
        </div>
        <div class="input-group" style="flex: 1;">
          <label>วันเกิด</label>
          <input type="date" id="birthday" name="birthday" required>
        </div>
      </div>

      <div class="input-group">
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" id="tel" name="tel" pattern="[0-9]{9,10}" placeholder="08XXXXXXXX" required>
      </div>

      <hr style="border: 0.5px solid #f0f0f0; margin: 25px 0;">
      
      <label>ข้อมูลที่อยู่</label>
      <div class="input-group"><input type="text" id="district" name="district" placeholder="ตำบล / แขวง" required></div>
      <div class="input-group"><input type="text" id="amphoe" name="amphoe" placeholder="อำเภอ / เขต" required></div>
      <div class="input-group"><input type="text" id="province" name="province" placeholder="จังหวัด" required></div>
      <div class="input-group"><input type="text" id="zipcode" name="zipcode" placeholder="รหัสไปรษณีย์" required></div>
      <div class="input-group">
        <textarea id="addr_detail" name="addr_detail" rows="2" placeholder="บ้านเลขที่, หมู่บ้าน, ซอย, ถนน" required></textarea>
      </div>

      <button type="submit" id="submitBtn" class="btn-submit">ยืนยันการสมัครสมาชิก</button>
    </form>
  </div>

  <script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script type="text/javascript" src="https://earthchie.github.io/jquery.Thailand.js/jquery.Thailand.js/dist/dependencies/JQL.min.js"></script>
  <script type="text/javascript" src="https://earthchie.github.io/jquery.Thailand.js/jquery.Thailand.js/dist/dependencies/typeahead.bundle.js"></script>
  <script type="text/javascript" src="https://earthchie.github.io/jquery.Thailand.js/jquery.Thailand.js/dist/jquery.Thailand.min.js"></script>

  <script>
    // เริ่มทำงานเมื่อเปิดหน้าเว็บ
    async function main() {
      try {
        await liff.init({ liffId: "2009630242-iPO8WjV7" });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        document.getElementById('userId').value = profile.userId;
        document.getElementById('lineName').value = profile.displayName;
        document.getElementById('loading-overlay').style.display = 'none';
      } catch (err) {
        console.error("LIFF Error:", err);
        alert("ไม่สามารถดึงข้อมูลโปรไฟล์ได้ กรุณาลองเปิดใหม่อีกครั้ง");
      }
    }

    $(function () {
      $.Thailand({
        $district: $('#district'),
        $amphoe: $('#amphoe'),
        $province: $('#province'),
        $zipcode: $('#zipcode'),
      });
      main();
    });

    // เมื่อกดปุ่มยืนยัน
    document.getElementById('regForm').onsubmit = function(e) {
      e.preventDefault();
      
      // แสดงสถานะกำลังบันทึก
      const btn = document.getElementById('submitBtn');
      const overlay = document.getElementById('loading-overlay');
      const loadingText = document.getElementById('loading-text');
      
      btn.disabled = true;
      loadingText.innerText = "กำลังบันทึกข้อมูลสมาชิก...";
      overlay.style.display = 'flex';

      const f = this;
      const fullAddress = `${f.addr_detail.value} ต.${f.district.value} อ.${f.amphoe.value} จ.${f.province.value} ${f.zipcode.value}`;

      const formData = {
        userId: f.userId.value,
        lineName: f.lineName.value,
        fullName: f.fullName.value,
        email: f.email.value,
        gender: f.gender.value,
        tel: f.tel.value,
        birthday: f.birthday.value,
        address: fullAddress
      };

      // ส่งไปที่ Google Apps Script
      google.script.run
        .withSuccessHandler(function() {
          overlay.style.display = 'none';
          alert("ลงทะเบียนสำเร็จ! ยินดีต้อนรับสู่ Daily Pet Shop ค่ะ 🐾");
          liff.closeWindow();
        })
        .withFailureHandler(function(err) {
          overlay.style.display = 'none';
          btn.disabled = false;
          alert("เกิดข้อผิดพลาด: " + err.message);
        })
        .registerNewMember(formData);
    };
  </script>
</body>
</html>
