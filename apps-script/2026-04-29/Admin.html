<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin - Daily Pet Shop</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #c54327; --bg: #fdf6f5; --text: #4A3F35; }
    body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: var(--primary); text-align: center; margin-top: 0; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: 'Kanit'; font-size: 1rem; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem; margin-top: 10px; }
    .btn-search { background: #4A3F35; color: white; }
    .btn-submit { background: var(--primary); color: white; }
    .btn:disabled { background: #ccc; }
    #customer-info { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 15px 0; display: none; border-left: 4px solid var(--primary); }
    .access-denied { text-align: center; color: red; margin-top: 50px; }
  </style>
</head>
<body>

<div id="admin-panel" style="display:none;">
  <div class="container">
    <h2>แผงควบคุมแอดมิน 👑</h2>
    
    <div class="form-group">
      <label>User ID ลูกค้า (จากระบบ)</label>
      <input type="text" id="target-uid" placeholder="Uxxxxxxxx...">
      <button class="btn btn-search" id="btn-lookup" onclick="lookupUser()">🔍 ตรวจสอบข้อมูลลูกค้า</button>
    </div>

    <div id="customer-info">
      <strong>ชื่อลูกค้า:</strong> <span id="info-name">-</span><br>
      <strong>ระดับปัจจุบัน:</strong> <span id="info-level">-</span><br>
      <strong>แต้มปัจจุบัน:</strong> <span id="info-points">0</span> แต้ม
    </div>

    <div id="form-section" style="display:none;">
      <div class="form-group">
        <label>ยอดซื้อ (บาท)</label>
        <input type="number" id="amount" placeholder="เช่น 500" required>
      </div>
      <div class="form-group">
        <label>หมายเหตุ / เลขคำสั่งซื้อ</label>
        <textarea id="note" rows="2" placeholder="เช่น Shopee #12345"></textarea>
      </div>
      <button class="btn btn-submit" id="btn-save" onclick="saveTransaction()">✨ บันทึกและส่งแต้มให้ลูกค้า</button>
    </div>
  </div>
</div>

<div id="denied" class="access-denied" style="display:none;">
  <h3>🚫 สิทธิ์เข้าถึงถูกจำกัด</h3>
  <p>หน้านี้เฉพาะแอดมิน Daily Pet Shop เท่านั้นค่ะ</p>
</div>

<script>
  const ADMIN_ID = "Ued028c7900a32cb361f5482fb2a513af"; // User ID ของคุณ Pick

  async function main() {
    try {
      await liff.init({ liffId: "2009630242-iPO8WjV7" });
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        const profile = await liff.getProfile();
        // 🔒 ระบบตรวจสอบความปลอดภัย
        if (profile.userId === ADMIN_ID) {
          document.getElementById('admin-panel').style.display = 'block';
        } else {
          document.getElementById('denied').style.display = 'block';
        }
      }
    } catch (err) {
      console.error(err);
    }
  }

  function lookupUser() {
    const uid = document.getElementById('target-uid').value;
    if (!uid) return alert("กรุณาใส่ User ID ลูกค้า");
    
    document.getElementById('btn-lookup').innerText = "กำลังค้นหา...";
    
    google.script.run
      .withSuccessHandler(function(data) {
        document.getElementById('btn-lookup').innerText = "🔍 ตรวจสอบข้อมูลลูกค้า";
        if (data) {
          document.getElementById('customer-info').style.display = 'block';
          document.getElementById('form-section').style.display = 'block';
          document.getElementById('info-name').innerText = data.name;
          document.getElementById('info-level').innerText = data.level;
          document.getElementById('info-points').innerText = data.points.toLocaleString();
        } else {
          alert("ไม่พบสมาชิกรายนี้ในระบบค่ะ");
        }
      })
      .getCustomerProfile(uid);
  }

  function saveTransaction() {
    const uid = document.getElementById('target-uid').value;
    const amount = parseFloat(document.getElementById('amount').value);
    const note = document.getElementById('note').value;
    
    if (!amount || amount <= 0) return alert("กรุณาระบุยอดซื้อที่ถูกต้อง");

    document.getElementById('btn-save').disabled = true;
    document.getElementById('btn-save').innerText = "กำลังบันทึกและส่งข้อความ...";

    google.script.run
      .withSuccessHandler(function(res) {
        if (res.status === "success") {
          alert(`✅ บันทึกสำเร็จ!\n\nลูกค้า: ${res.customerName}\nแต้มใหม่: ${res.newPoints}\nระดับ: ${res.newLevel}`);
          location.reload(); // รีโหลดหน้าเพื่อล้างข้อมูล
        } else {
          alert("เกิดข้อผิดพลาด: " + res.message);
          document.getElementById('btn-save').disabled = false;
        }
      })
      .addAdminTransaction(uid, amount, note);
  }

  main();
</script>
</body>
</html>
