<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Pet Shop - Member Card</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dps-main: #c54327;
      --dps-secondary: #fdf6f5;
      --dps-accent: #faaf73;
      --white: #ffffff;
      --text-dark: #4A3F35;
    }
    body {
      font-family: 'Kanit', sans-serif;
      background-color: #f2e2c0;
      color: var(--text-dark);
      margin: 0; padding: 0;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--dps-secondary);
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999;
    }
    .card-container { width: 92%; max-width: 400px; margin-top: 25px; filter: drop-shadow(0 12px 20px rgba(0,0,0,0.15)); }
    .header-card { background: var(--dps-main); border-radius: 24px 24px 0 0; padding: 22px; text-align: center; color: var(--white); }
    .body-card { background: var(--white); border-radius: 0 0 24px 24px; padding: 30px 20px 20px; text-align: center; }
    .profile-img { width: 85px; height: 85px; border-radius: 50%; border: 4px solid var(--white); margin-top: -75px; background: #f0f0f0; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .member-name { font-size: 1.5rem; font-weight: 600; margin: 12px 0 6px; }
    .level-badge { display: inline-block; padding: 5px 18px; border-radius: 25px; font-size: 0.85rem; font-weight: 500; margin-bottom: 18px; color: white; }
    .level-gold { background: linear-gradient(45deg, #D4AF37, #F1D37E); }
    .level-silver { background: linear-gradient(45deg, #C0C0C0, #E0E0E0); }
    .level-bronze { background: linear-gradient(45deg, #cd7f32, #f4a460); }
    .progress-container { background: #f0f0f0; border-radius: 12px; height: 12px; width: 100%; margin: 15px 0 8px; overflow: hidden; }
    .progress-fill { background: var(--dps-accent); height: 100%; width: 0%; transition: width 1.2s ease-in-out; }
    .next-level-info { font-size: 0.8rem; color: #777; margin-bottom: 25px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #f5f5f5; padding: 20px 0; }
    .stat-value { font-size: 1.6rem; font-weight: 600; color: var(--dps-main); }
    .stat-label { font-size: 0.8rem; color: #999; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; width: 100%; }
    .menu-item { background: #fff9f8; border: 1.5px solid #ffe4e0; border-radius: 16px; padding: 15px 10px; text-decoration: none; color: var(--text-dark); display: flex; flex-direction: column; align-items: center; transition: all 0.2s ease; }
    .menu-item:active { transform: scale(0.95); }
    .badge-count { background: var(--dps-main); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
    .error-msg { color: var(--dps-main); font-weight: 500; padding: 20px; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div style="margin-bottom: 10px;">กำลังโหลดข้อมูลสมาชิก...</div>
  </div>

  <div class="card-container" id="main-content" style="display:none;">
    <div class="header-card">
      <div style="font-weight: 400; letter-spacing: 3px; font-size: 0.9rem;">DAILY PET SHOP</div>
    </div>
    <div class="body-card">
      <img id="user-img" class="profile-img" src="" alt="Profile">
      <div class="member-name" id="display-name">-</div>
      <div id="display-level" class="level-badge">Bronze</div>

      <div id="progress-section">
        <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
        <div id="next-level-text" class="next-level-info">-</div>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="display-points">0</div>
          <div class="stat-label">แต้มสะสม</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="display-spending">0</div>
          <div class="stat-label">ยอดซื้อรวม (฿)</div>
        </div>
      </div>

      <div class="menu-grid">
        <a href="#" class="menu-item" onclick="alert('แสดงรายการซื้อเร็วๆ นี้')">
          <span style="font-size:1.5rem">📜</span><span style="font-size:0.9rem">ประวัติการซื้อ</span>
        </a>
        <a href="#" class="menu-item" onclick="alert('คูปองของคุณเร็วๆ นี้')">
          <span style="font-size:1.5rem">🎟️</span><span style="font-size:0.9rem">คูปองของฉัน</span>
          <div id="coupon-badge" class="badge-count" style="display:none;">0</div>
        </a>
      </div>
      <p style="font-size: 0.7rem; color: #ccc; margin-top: 20px;">วันที่สมัคร: <span id="display-date">-</span></p>
    </div>
  </div>

  <script>
    // 💉 รับค่า UserId ที่ฉีดมาจาก Server (Main.js)
    const INJECTED_USER_ID = "<?= userId ?>";

    async function main() {
      try {
        await liff.init({ liffId: "2009630242-iPO8WjV7" });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        const userId = profile.userId;
        
        // เรียก Apps Script function
        loadMemberData(userId);
      } catch (err) {
        showError("LIFF Connection Error");
      }
    }

    function loadMemberData(userId) {
      google.script.run
        .withSuccessHandler(function(data) {
          if (!data) {
            // หากไม่พบข้อมูลสมาชิก ให้เปิดหน้า LIFF สมัครสมาชิกตัวที่ 2 ทันที
            window.location.href = "https://liff.line.me/2009630242-iPO8WjV7?page=Registration"; 
            return;
          }
          renderUI(data);
        })
        .withFailureHandler(function(err) {
          showError("Server Connection Error");
        })
        .getCustomerProfile(userId);
    }

    function renderUI(data) {
      document.getElementById('display-name').innerText = data.name;
      document.getElementById('display-points').innerText = data.points.toLocaleString();
      document.getElementById('display-spending').innerText = (data.totalSpending || 0).toLocaleString();
      document.getElementById('display-date').innerText = data.memberSince;
      
      const levelEl = document.getElementById('display-level');
      levelEl.innerText = data.level;
      levelEl.className = 'level-badge ' + (data.level.includes("Gold") ? 'level-gold' : data.level.includes("Silver") ? 'level-silver' : 'level-bronze');

      // Progress Calculation
      let nextGoal = data.totalSpending >= 2001 ? 10001 : 2001;
      let nextLevelName = data.totalSpending >= 2001 ? "Gold (VIP)" : "Silver (Member)";
      
      if (data.totalSpending >= 10001) {
        document.getElementById('progress-section').style.display = 'none';
      } else {
        const percent = Math.min((data.totalSpending / nextGoal) * 100, 100);
        document.getElementById('progress-bar').style.width = percent + "%";
        document.getElementById('next-level-text').innerText = `อีก ฿${(nextGoal - data.totalSpending).toLocaleString()} เพื่อเป็น ${nextLevelName}`;
      }

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
    }

    function showError(msg) {
      document.getElementById('loading-screen').innerHTML = `<div class="error-msg">❌ ${msg}<br><small>กรุณาปิดและเปิดใหม่อีกครั้ง</small></div>`;
    }

    main();
  </script>
</body>
</html>
